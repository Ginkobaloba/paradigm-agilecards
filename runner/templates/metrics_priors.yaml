# Per-work_type shrinkage overrides. Defaults to `shrinkage_k` above;
# this map lets operators tighten the blend when a work_type has
# narrower historical variance (docs cards usually take a predictable
# amount of time; spike cards are wildly variable). Empty by default.
shrinkage_k_overrides: {}
