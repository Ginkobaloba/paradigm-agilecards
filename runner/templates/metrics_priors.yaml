# Cold-start priors for the throughput-metrics estimator.
#
# This file is the global fallback per `docs/design/throughput_metrics_ledger.md`
# section 8.3. The estimator layers three priors narrowest-to-broadest:
#
#   1. Per-(work_type, tier) -- whatever `metric_estimates` currently holds.
#   2. Per-tier only         -- aggregate across all work_types at the tier.
#   3. Global cold-start     -- this file. Used only when neither of the above
#                               has enough data.
#
# Numbers here are operator-editable per project. The defaults below are
# conservative starting guesses; the spec deliberately did not commit to
# specific values because the empirical-shrinkage formula means they only
# matter at n=0 and rapidly wash out as real data accrues (50/50 blend at
# n=5 with k=5; 90% empirical at n=50).
#
# Schema: `tiers[<tier>]` carries percentile estimates for that tier's
# typical work. The estimator reads `agent_wall_seconds_p50`,
# `agent_wall_seconds_p75`, `agent_wall_seconds_p90` directly into the
# blend formula; the other fields are reserved for future shrinkage
# beyond the wall-clock signal.

version: 1
updated: 2026-05-29

# Shrinkage constant per `docs/design/throughput_metrics_ledger.md` section 8.2.
# weight_empirical = n / (n + k); at k=5 the crossover (50/50 prior vs
# empirical) lands at n=5. Tunable per work_type in `overrides:` below
# when domain knowledge justifies a tighter or looser blend.
shrinkage_k: 5

# Per-tier global priors. Wall-clock seconds derive from "this tier
# usually finishes in roughly N minutes for a routine card"; tokens
# follow the tier_map model assignment scaled by typical session size.
# Numbers are conservative -- err on overestimating, since the shrinkage
# formula corrects fast and underestimates create over-confidence in
# quotes.
tiers:
  1:
    # haiku, no extended thinking -- trivial edits, copy tweaks.
    agent_wall_seconds_p50: 180
    agent_wall_seconds_p75: 360
    agent_wall_seconds_p90: 900
    executor_tokens_p50: 8000
    executor_tokens_p90: 24000
    human_review_wall_seconds_p50: 300
    human_review_wall_seconds_p90: 1800
    rework_rate_mean: 0.10
    contract_survival_rate: 0.90

