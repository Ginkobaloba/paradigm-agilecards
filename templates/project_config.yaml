# Per-project config for the /cards workflow.
#
# Lives at <project_root>\.cards-config.yaml. The /cards skill reads it
# during step 1 (resolve context). If absent, defaults apply.
#
# This file is the project's opt-in to non-default /cards behavior.

version: 1

# Branch strategy.
#   full: one feature branch per card (card/<id>), one PR per card.
#   lean: all cards in a batch share one branch (cards/<batch_id>),
#         one PR per batch.
mode: full   # full | lean

# Base branch every card branches off of, unless an individual card
# overrides via its frontmatter `base_branch:` field.
base_branch: main

# Merge gate overrides. By default the gate is tier-aware (see README).
# A project can tighten the gate but not loosen it for high-stakes work.
merge_gates:
  # Tier 1, 2: low stakes, low difficulty (haiku family).
  low:
    auto_merge: true
    require_lint: true
    require_tests: true

  # Tier 3, 4: medium stakes (sonnet family).
  medium:
    auto_merge: true
    require_lint: true
    require_tests: true
    require_sibling_review: true   # cheap second agent reads the diff

  # Tier 5, 6: high stakes (opus family). pin_required=true forces this
  # path regardless of the project's preference.
  high:
    auto_merge: false
    require_lint: true
    require_tests: true
    require_human_approval: true   # always true for high stakes

# Default model floor cap. Some projects may want to forbid haiku
# entirely (e.g. anything customer-facing). The runner will never pick a
# model below this floor for any card in this project, even tier 1.
# Comment out to use card-level floor only.
# project_model_floor: sonnet

# Files or globs that the planner should treat as parallel-hazardous
# regardless of card content. If two cards both `touches:` something in
# this list, the manifest flags them.
hot_paths:
  - src/api/middleware/**
  - src/db/migrations/**

# Orphan reclaim. If a card sits in active/ with last_heartbeat older
# than this, the next runner pass moves it back to backlog/ and clears
# the claim metadata. Tune up for long-running cards, down for fleets
# that should fail fast.
orphan_timeout_minutes: 120

# Optional: path to the source-of-truth story doc. If set, the runner
# can re-hash this file on every claim and compare against the card's
# story_hash. Mismatch flags the card for re-triage instead of executing
# against drifted intent. Leave commented out for ad-hoc stories where
# the planner input is the only source.
# story_source_path: docs/rfcs/rate-limiting.md

# Optional. Override the default deep-mode token threshold for switching
# from 2-agent to 3-agent planning.
# deep_plan_token_threshold: 3000

# Optional. Where the runner posts status updates back to (Slack, file,
# etc). This is a runner concern; the /cards skill ignores it.
# runner_callback: file://C:/dev/todo/_runner.log

# AC amendment approval. When true, a sibling reviewer agent is
# permitted to approve a card's change_request without a human standup
# pass. When false (default), every amendment requires a human in the
# approval path. SKILL.md section 11 spells out the amendment pattern;
# RUNNER_CONTRACT.md "AC amendment protocol" documents how the runner
# records the approval against either a human or a delegated agent.
# Flip to true only on projects where you have explicit appetite for
# fully-agent-managed amendment review.
reviewer_delegation: false

# Cold-read verifier knobs (see RUNNER_CONTRACT.md "Cold-read
# verification"). The runner reads these to decide when the verifier
# may be skipped on a high-confidence cascade-clean run.
#   verifier_skip_confidence_threshold: minimum executor self-reported
#     confidence (0-1) required to skip the verifier. Default 0.9.
#     Projects MAY tighten (raise) this floor; they MUST NOT relax it
#     below 0.9.
verifier_skip_confidence_threshold: 0.9

# Cascade-on-confidence knobs (see RUNNER_CONTRACT.md
# "Cascade-on-confidence routing"). The runner reads these to decide
# when to escalate the executor mid-card.
#   cascade_escalation_threshold: combined confidence (0-1) below which
#     the runner escalates one tier. Default 0.6.
#   cascade_max_escalations: ceiling on how many tiers above
#     card.points the runner can climb. Default 2; v1.2 contract caps
#     this at 2. Set to 0 to opt out of cascade entirely (cards then
#     always run at planned tier and the verifier is always required).
cascade_escalation_threshold: 0.6
cascade_max_escalations: 2

# Verifier subjective-evaluator cascade (v1.3, see RUNNER_CONTRACT.md
# "Cold-read verification"). The runner uses these to drive the
# haiku -> sonnet -> opus escalation for subjective AC items. A
# subjective item that cannot reach the confidence floor at the cap
# tier moves the card to awaiting_standup_review/ instead of
# auto-passing or auto-failing.
#
#   subjective_starting_tier: name of the model family the cascade
#     starts at. One of haiku, sonnet, opus. Default haiku.
#   subjective_max_tier: cap tier. The cascade does not climb past
#     this. Default opus.
#   subjective_confidence_threshold: minimum confidence (0.0-1.0)
#     the evaluator must report to settle a verdict at the current
#     tier. Default 0.85.
#   subjective_cascade_disabled: when true, subjective items
#     auto-route to awaiting_standup_review/ without consulting any
#     model. Default false. Useful in cost-sensitive projects that
#     want every subjective item to land in a human's lap.
subjective_starting_tier: haiku
subjective_max_tier: opus
subjective_confidence_threshold: 0.85
subjective_cascade_disabled: false

# Network gating for v1.3 verifier http_status / http_contains AC
# types. Disabled by default; opt in only when CI has the routes the
# verifier will hit.
# network_checks_allowed: false

# Per-type timeout overrides (project-wide). Item-level timeout_sec
# wins over this; this wins over the per-type default. Keys are the
# canonical type strings from lib/verifier/types.py.
# type_timeout_overrides_sec:
#   command: 120
#   python_assert: 10
