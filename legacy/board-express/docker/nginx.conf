# Nginx config for the frontend container. Serves the built React app and
# forwards API + SSE traffic to the backend service on the compose network.
#
# ${BASE_PATH} is substituted at image-build time (Dockerfile.frontend
# uses sed). When BASE_PATH=/ the app sits at the root (back-compat with
# the pre-portal deployment). When BASE_PATH=/board/ the app sits under
# that prefix, ready to live behind the Paradigm portal reverse proxy at
# `portal.projectnexuscode.org/board/`.
#
# The build-time substitution keeps Vite's `base` (which bakes asset URLs
# into the JS bundle) and nginx's URL prefixes in lockstep: a single
# BASE_PATH build arg drives both.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets + SPA fallback. ${BASE_PATH} always ends with /, so
    # when it is "/" this becomes "location /" and the fallback is
    # /index.html; when it is "/board/" the fallback is /board/index.html
    # which Vite emitted with the right asset URLs.
    location ${BASE_PATH} {
        try_files $uri $uri/ ${BASE_PATH}index.html;
    }

    # REST proxy. The trailing slash on both sides matters: nginx strips
    # the matched location prefix off the URI and appends what is left
    # to the proxy_pass URI. "/board/api/cards" -> "/api/cards".
    location ${BASE_PATH}api/ {
        proxy_pass         http://backend:4070/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE proxy. No trailing slash because the backend route is /events,
    # not /events/. Disable buffering so events stream in real time.
    location = ${BASE_PATH}events {
        proxy_pass         http://backend:4070/events$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }

    # Health passthrough, useful for the Cloudflare tunnel.
    location = ${BASE_PATH}healthz {
        proxy_pass         http://backend:4070/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }
}
