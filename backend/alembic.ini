# Alembic config for the AgileCards backend (ADR-2026-07-16).
#
# The connection URL is resolved in migrations/env.py from
# PARADIGM_DATABASE_MIGRATE_URL (an owner/admin DSN -- migrations create roles,
# policies, and triggers, which the runtime agilecards_app role deliberately
# cannot). The sqlalchemy.url here is a placeholder, never a real credential.

[alembic]
script_location = migrations
sqlalchemy.url = postgresql+psycopg://OVERRIDDEN_IN_ENV_PY/agilecards

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
