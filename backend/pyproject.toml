[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "paradigm-agilecards-backend"
version = "0.0.0"
description = "Paradigm AgileCards backend (FastAPI). K2 scaffold only; K11 owns the real Cards API."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "httpx>=0.27",
  "ruff>=0.5",
]

# Single-module scaffold (app.py). K11 will likely promote this to a package.
[tool.setuptools]
py-modules = ["app"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
