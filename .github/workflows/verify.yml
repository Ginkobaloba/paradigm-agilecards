# .github/workflows/verify.yml
# Last updated: 2026-06-26
#
# BRANCH PROTECTION NOTE:
# For the deep-verify gate to actually block merges, add "deep-verify" as a
# Required status check in branch protection settings for your default branch
# (Settings > Branches > branch protection rule > "Require status checks to pass
# before merging"). Without this, the job runs but GitHub will still allow merge
# if it fails or is skipped.
#
# WINDOWS / HEADED NOTE:
# The headed layer (Layer 5, Windows MCP / computer-use) and adversarial generation
# (--adversarial) are LOCAL deep-verify steps -- they require a real Windows desktop
# with Chrome and the computer-use MCP running. They cannot run in CI. CI covers
# layers 1-4 and curated edge cases only. The human-gated local run covers layers 5-6.
# Default to ubuntu-latest for network and headless layers.
#
# PLACEHOLDER / SKIP NOTE:
# quick-verify only runs when verify/smoke.yml has a real, reachable deploy_url.
# A `detect` job reads deploy_url first; if it is a placeholder (no host yet, or a
# deploy that is not publicly reachable), quick-verify is SKIPPED, not reported as a
# pass. A skipped check is honest -- it shows the PR was not smoke-verified instead of
# painting a green "pass" over a smoke run that tested nothing. Set a real deploy_url
# to light up the live smoke.

name: Paradigm Verify

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  detect:
    name: Detect deploy target
    runs-on: ubuntu-latest
    outputs:
      live: ${{ steps.check.outputs.live }}
      deploy_url: ${{ steps.check.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read deploy_url from verify/smoke.yml
        id: check
        run: |
          url="$(yq -r '.deploy_url' verify/smoke.yml)"
          echo "deploy_url=$url" >> "$GITHUB_OUTPUT"
          case "$url" in
            ""|null|*example*|*placeholder*|*pending*|*"<"*)
              echo "live=false" >> "$GITHUB_OUTPUT"
              echo "::notice title=Live smoke skipped::deploy_url is a placeholder ($url). No reachable deploy is configured, so quick-verify is skipped (neutral, not a pass). Set a real deploy_url in verify/smoke.yml to enable the live smoke." ;;
            *)
              echo "live=true" >> "$GITHUB_OUTPUT" ;;
          esac

  quick-verify:
    name: Quick Verify (all PRs)
    needs: detect
    if: needs.detect.outputs.live == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run quick smoke against verify/smoke.yml
        run: bash verify/ci/quick_smoke.sh verify/smoke.yml

  deep-verify:
    name: Deep Verify (tier-3 PRs only)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'tier-3')
    needs: quick-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require committed local deep-verify report
        run: bash verify/ci/deep_gate.sh
