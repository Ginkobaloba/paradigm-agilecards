name: CI

# The auto-merge safety floor (PARADIGM_VELOCITY_RULES section 4): a PR
# does not merge unless CI on its head SHA is green. This workflow is the
# gating check. It runs on windows-latest to match the development host
# (the runner suite is developed and verified on Windows).
#
# Job NAMES below are load-bearing: three of them are required status-check
# contexts in main's branch protection. Do not rename them without updating
# the protection rule too, or PRs will hang waiting for a context that never
# reports.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-runner:
    name: engine runner battery (lint + tests)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engine/runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/runner/pyproject.toml

      - name: Install runner (with dev extras)
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -q

      # Type-check is informational for now: the tree carries pre-existing
      # mypy debt in legacy modules that is not gated by the battery.
      # Surfaced here so the debt stays visible without blocking merges.
      # Drop continue-on-error once the backlog is cleared.
      - name: Type-check (mypy, informational)
        continue-on-error: true
        run: mypy

  board-frontend:
    name: board frontend battery (lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint (informational while monorepo settles)
        continue-on-error: true
        run: npm run lint --if-present

      - name: Tests (vitest)
        run: npm test --if-present -- --run

  board-backend:
    name: board backend battery (build + tests)
    runs-on: ubuntu-latest
    # Legacy Express/TS backend, frozen reference for the K11 FastAPI rewrite.
    # Still the currently-live board backend, so its coverage stays on until
    # K11 replaces it. Repathed under legacy/ by chunk K2.
    defaults:
      run:
        working-directory: legacy/board-express/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: legacy/board-express/backend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Build (tsc)
        run: npm run build --if-present

      - name: Tests
        continue-on-error: true
        run: npm test --if-present

  backend-fastapi:
    name: backend (fastapi scaffold)
    runs-on: ubuntu-latest
    # New Python/FastAPI backend (chunk K2 scaffold). Not yet a required
    # context; promote it in branch protection once K11 lands the real API.
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (with dev extras)
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

  contracts:
    name: contracts (@paradigm/* consumer contract tests)
    runs-on: ubuntu-latest
    # Chunk K16 (CARDS-013 + CARDS-014): consumer contract tests against the
    # @paradigm/* packages. Runs on every PR and -- because Renovate opens PRs --
    # on every @paradigm/* version bump (renovate.json keeps those PRs from
    # auto-merging; Drew reviews them). The suites are self-contained and do not
    # install the app dependency sets. Not yet a required status context; promote
    # it in branch protection once it has baked.
    steps:
      - uses: actions/checkout@v4

      # --- CARDS-013: Python contract for @paradigm/auth (backend/contracts) ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/contracts/requirements.txt

      - name: Install Python contract deps
        working-directory: backend
        run: pip install -r contracts/requirements.txt

      - name: Lint Python contracts (ruff)
        working-directory: backend
        run: ruff check contracts

      - name: Python auth contract (CARDS-013)
        working-directory: backend
        run: pytest contracts -q

      # --- CARDS-014: TS contract for @paradigm/llm-client (frontend/contracts) ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (npm ci)
        working-directory: frontend
        run: npm ci

      - name: TS llm-client contract (CARDS-014)
        working-directory: frontend
        run: npm run test:contracts
