name: CI

# The auto-merge safety floor (PARADIGM_VELOCITY_RULES section 4): a PR
# does not merge unless CI on its head SHA is green. This workflow is the
# gating check. It runs on windows-latest to match the development host
# (the runner suite is developed and verified on Windows).
#
# Job NAMES below are load-bearing: three of them are required status-check
# contexts in main's branch protection. Do not rename them without updating
# the protection rule too, or PRs will hang waiting for a context that never
# reports.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-runner:
    name: engine runner battery (lint + tests)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engine/runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/runner/pyproject.toml

      - name: Install runner (with dev extras)
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -q

      # Type-check is informational for now: the tree carries pre-existing
      # mypy debt in legacy modules that is not gated by the battery.
      # Surfaced here so the debt stays visible without blocking merges.
      # Drop continue-on-error once the backlog is cleared.
      - name: Type-check (mypy, informational)
        continue-on-error: true
        run: mypy

  board-frontend:
    name: board frontend battery (lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint (informational while monorepo settles)
        continue-on-error: true
        run: npm run lint --if-present

      - name: Tests (vitest)
        run: npm test --if-present -- --run

  board-backend:
    name: board backend battery (build + tests)
    runs-on: ubuntu-latest
    # Legacy Express/TS backend -- still the LIVE board. Active until the
    # FastAPI backend cutover (P1); relabeled 2026-07-16. Its tests gate for
    # real (audit S1: continue-on-error made 96 tests decorative).
    defaults:
      run:
        working-directory: legacy/board-express/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: legacy/board-express/backend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Build (tsc)
        run: npm run build --if-present

      - name: Tests
        run: npm test --if-present

  backend-fastapi:
    name: backend (fastapi scaffold)
    runs-on: ubuntu-latest
    # The real FastAPI backend (ADR-2026-07-16): Postgres persistence with
    # DB-enforced RLS. This suite INCLUDES the RLS/org-isolation security
    # tests, run against a live Postgres service container at the same
    # privilege level as production (agilecards_app role). It MUST be
    # promoted to a required status check in branch protection -- a security
    # suite that can fail without blocking merges is the audit's S1 failure
    # mode. (Job `name:` is a protection context once promoted; do not
    # rename.)
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          # Throwaway CI-only credential; the suite creates and drops a
          # uniquely-named database per session (tests/conftest.py).
          POSTGRES_PASSWORD: ci_admin_pw
        ports:
          - 5432:5432
        # The runner only proceeds once Postgres accepts connections;
        # without this the suite races the database boot.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (with dev extras)
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        env:
          # Admin DSN for the Postgres service container above. conftest.py
          # fails loudly (never skips) when it cannot reach this -- silent
          # green on the security suite is exactly what S1 forbids.
          AGILECARDS_TEST_ADMIN_DSN: postgresql+psycopg://postgres:ci_admin_pw@localhost:5432/postgres
        run: pytest -q

      # Audit T17 (pyproject.toml [tool.mypy]): the auth-critical package is
      # gated, not informational -- no continue-on-error.
      - name: Type-check (mypy)
        run: mypy

  # Compliance seam #6 (2026-07-16 audit T1): a CycloneDX SBOM for the whole
  # repo on every PR/push, attached as a workflow artifact. Generation only --
  # no policy gate, no vulnerability scanning here; downstream consumers make
  # those calls. anchore/sbom-action wraps syft and uploads the artifact.
  sbom:
    name: sbom (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (syft -> CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: paradigm-agilecards.cyclonedx.json
          upload-artifact: true

  contracts:
    name: contracts (@paradigm/* consumer contract tests)
    runs-on: ubuntu-latest
    # Chunk K16 (CARDS-013 + CARDS-014): consumer contract tests against the
    # @paradigm/* packages. Runs on every PR and -- because Renovate opens PRs --
    # on every @paradigm/* version bump (renovate.json keeps those PRs from
    # auto-merging; Drew reviews them). The suites are self-contained and do not
    # install the app dependency sets. Not yet a required status context; promote
    # it in branch protection once it has baked.
    steps:
      - uses: actions/checkout@v4

      # --- CARDS-013: Python contract for @paradigm/auth (backend/contracts) ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/contracts/requirements.txt

      - name: Install Python contract deps
        working-directory: backend
        run: pip install -r contracts/requirements.txt

      - name: Lint Python contracts (ruff)
        working-directory: backend
        run: ruff check contracts

      - name: Python auth contract (CARDS-013)
        working-directory: backend
        run: pytest contracts -q

      # --- CARDS-014: TS contract for @paradigm/llm-client (frontend/contracts) ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (npm ci)
        working-directory: frontend
        run: npm ci

      - name: TS llm-client contract (CARDS-014)
        working-directory: frontend
        run: npm run test:contracts
